experience:
  type: experience
  items:
    - dates: {es: "2022 - Presente", en: "2022 - Present"}
      title: {es: "Investigación", en: "Research"}
      subtitle: {es: "Caracterización de la galaxia enana esferoidal de Sagitario a bajas latitudes Galácticas", en: "Characterization of the Sagittarius dwarf spheroidal galaxy at low Galactic latitudes"}
      location: {es: "Universidad de Antofagasta", en: "Universidad de Antofagasta"}
      titlecomment:
        es: "Investigador principal del proyecto financiado por la Beca de Doctorado Nacional de ANID (2024-2026). Caracterización detallada de la estructura, contenido estelar y dinámica de la galaxia enana de Sagitario en regiones de baja latitud Galáctica, combinando datos fotométricos y espectroscópicos de múltiples surveys."
        en: "Principal investigator of the project funded by the ANID National Doctoral Scholarship (2024-2026). Detailed characterization of the structure, stellar content, and dynamics of the Sagittarius dwarf galaxy in low Galactic latitude regions, combining photometric and spectroscopic data from multiple surveys."
      priority: 1
    - dates: {es: "2023 - Presente", en: "2023 - Present"}
      title: {es: "Docente", en: "Instructor"}
      subtitle: {es: "Duoc UC, Escuela de Informática y Telecomunicaciones", en: "Duoc UC, School of Informatics and Telecommunications"}
      location: {es: "Santiago, Chile", en: "Santiago, Chile"}
      titlecomment:
        es: "Dicto las clases de Machine Learning y Deep Learning para estudiantes de ingeniería en informática."
        en: "Teaching Machine Learning and Deep Learning courses for computer engineering students."
      priority: 1
    - dates: {es: "04/2025 - 10/2025", en: "04/2025 - 10/2025"}
      title: {es: "Early Career Visitor Programme", en: "Early Career Visitor Programme"}
      subtitle: {es: "Caracterización de nuevos cúmulos de la galaxia de Sagitario", en: "Characterization of new Sagittarius Dwarf Galaxy Clusters"}
      location: {es: "ESO, Chile", en: "ESO, Chile"}
      titlecomment:
        es: "Investigador en un proyecto liderado por la Dra. Elisa R. Garro que combina fotometría profunda de HST (WFC3, F555W y F814W) y espectroscopía FLAMES+UVES (98 hrs, IP: Garro) para determinar con precisión edades y composiciones químicas de cúmulos globulares de la galaxia de Sagitario. Los objetivos incluyen resolver la relación edad-metalicidad, poner a prueba escenarios de formación durante la interacción Sgr-Vía Láctea, y comparar con modelos teóricos para reconstruir la historia evolutiva de Sgr."
        en: "Researcher in the project led by Dr. Elisa R. Garro combining deep HST photometry (WFC3, F555W and F814W) and FLAMES+UVES spectroscopy (98 hrs, PI: Garro) to precisely determine ages and chemical compositions of Sagittarius dwarf galaxy globular clusters. Goals include resolving the age-metallicity relation, testing formation scenarios during Sgr-Milky Way interaction, and comparing with theoretical models to reconstruct Sgr's evolutionary history."
      priority: 1
    - dates: {es: "09/2024 - Presente", en: "09/2024 - Present"}
      title: {es: "Investigación", en: "Research "}
      subtitle: {es: "Estrellas variables en la galaxia esferoidal de Sagitario", en: "Variable stars in the Sagittarius dwarf spheroidal galaxy"}
      location: {es: "NOIRLab", en: "NOIRLab"}
      titlecomment:
        es: "Colaboración con la investigadora de NOIRLab, Kathy Vivas, para detectar y clasificar estrellas variables (con foco en estrellas $\\delta$ Scuti y RR Lyrae) en las regiones centrales de la galaxia de Sagitario, usando datos multiépoca de DECam."
        en: "Collaboration with NOIRlab researcher Kathy Vivas to detect and classify variable stars (focus on $\\delta$ Scuti and RR Lyrae stars) in the central regions of Sagittarius galaxy using multiepoch DECam data."
      priority: 1
    - dates: {es: "08/2021 - 04/2022", en: "08/2021 - 04/2022"}
      title: {es: "Científico de Datos", en: "Data Scientist"}
      subtitle: {es: "Grupo Kaufmann AWTO", en: "Grupo Kaufmann AWTO"}
      location: {es: "Chile y Brasil", en: "Chile and Brasil"}
      titlecomment:
        es: "Diseño e implementación de modelos de aprendizaje automático, realización de análisis exploratorio de datos, y comunicación de resultados y recomendaciones a stakeholders."
        en: "Design and implement machine learning models, perform exploratory data analysis, communicate insights and recommendations to stakeholders."
      priority: 1
    - dates: {es: "03/2020 - 11/2020", en: "03/2020 - 11/2020"}
      title: {es: "Investigación", en: "Research"}
      subtitle: {es: "Investigador principal en proyecto titulado búsqueda y caracterización de cúmulos estelares en el extremo lejano de la barra Galáctica", en: "Principal investigator of the project: Search and characterization of star clusters in the far end of the Galactic bar"}
      location: {es: "CITEVA, Universidad de Antofagasta", en: "CITEVA, Universidad de Antofagasta"}
      titlecomment:
        es: "Desarrollo de una metodología basada en aprendizaje automático no supervisado para la búsqueda de candidatos a cúmulos jóvenes en el extremo lejano de la barra Galáctica. Este trabajo permitió identificar tres nuevos candidatos a cúmulo en una región de alta extinción y densidad de fuentes de la Vía Láctea. Bajo la supervisión del Dr. Sebastián Ramírez y la Dra. Karla Peña Ramírez."
        en: "Development of a methodology based on unsupervised machine learning to search for young cluster candidates at the far end of the Galactic bar. This work allowed us to identify three new cluster candidates at a highly extincted and crowded region of the Milky Way. Under the supervision of Dr. Sebastián Ramírez and Dra. Karla Peña Ramírez."
      priority: 1
    - dates: {es: "03/2020 - 11/2020", en: "03/2020 - 11/2020"}
      title: {es: "Asistente de Investigación", en: "Research Assistant"}
      subtitle: {es: "Modelos espectroscópicos para atmósferas planetarias", en: "Spectroscopy models for planetary atmospheres"}
      location: {es: "CITEVA, UA", en: "CITEVA, UA"}
      titlecomment:
        es: "Estudio de espectroscopía de transmisión \\textit{in silico} para atmósferas de planetas tipo Tierra y mini-Neptunos. El resultado de esta investigación fue parte de una propuesta de tiempo de telescopio para JWST (Time Proposal \\#2684, cycle 1). Bajo la supervisión del Dr. Jeremy Tregloan-Reed."
        en: "Study on transmission spectroscopy \\textit{in silico} models for Earth-like and Mini-Neptunes planetary atmospheres. The result of this research was used for a JWST Time Proposal (\\#2684, cycle 1). Under the supervision of Dr. Jeremy Tregloan-Reed."
      priority: 1
    - dates: {es: "2015 - 2025", en: "2015 - 2025"}
      title: {es: "Observador", en: "Observer"}
      subtitle: {es: "Proyecto 1M2H, UC Santa Cruz", en: "1M2H Project, UC Santa Cruz"}
      location: {es: "Observatorio Las Campanas, Atacama, Chile", en: "Las Campanas Observatory, Atacama, Chile"}
      titlecomment:
        es: "Seguimiento fotométrico de transientes utilizando el telescopio Swope. Responsable de la adquisición de datos, control de calidad, y resolución de problemas del sistema. Bajo la supervisión del Dr. Ryan Foley."
        en: "Photometric transients follow-up using Swope Telescope. Responsible for data acquisition, data quality assurance, and system troubleshooting. Under the supervision of Dr. Ryan Foley."
      priority: 1
    - dates: {es: "01/2016 - 06/2016", en: "01/2016 - 06/2016"}
      title: {es: "Asistente de Investigación", en: "Research Assistant"}
      subtitle: {es: "Reducción de datos", en: "Data reduction"}
      location: {es: "Instituto de Astronomía, Universidad Católica del Norte, Antofagasta, Chile", en: "Instituto de Astronomía, Universidad Católica del Norte, Antofagasta, Chile"}
      titlecomment:
        es: "Reducción de datos de los instrumentos FORS (VLT) y MagE (Magallanes). Bajo la supervisión del Dr. Christian Moni Bidin."
        en: "Data reduction of VLT FORS and Magellan MagE data. Under the supervision of Dr. Christian Moni Bidin."
      priority: 1
    - dates: {es: "2014 - 2015", en: "2014 - 2015"}
      title: {es: "Observador", en: "Observer"}
      subtitle: {es: "Carnegie Supernova Project II", en: "Carnegie Supernova Project II"}
      location: {es: "Observatorio Las Campanas, Atacama, Chile", en: "Las Campanas Observatory, Atacama, Chile"}
      titlecomment:
        es: "Observaciones de supernovas de bajo corrimiento al rojo utilizando el telescopio Swope. Bajo la supervisión del Dr. Mark M. Phillips."
        en: "Observations of low-redshift supernovae using the Swope Telescope at Las Campanas Observatory. Under the supervision of Dr. Mark M. Phillips."
      priority: 1
    - dates: {es: "2014 - 2015", en: "2014 - 2015"}
      title: {es: "Asistente de Investigación", en: "Research Assistant"}
      subtitle: {es: "Sonificación de imágenes médicas", en: "Sonification of medical images"}
      location: {es: "Instituto de Música, Pontificia Universidad Católica de Chile, Santiago, Chile", en: "Instituto de Música, Pontificia Universidad Católica de Chile, Santiago, Chile"}
      titlecomment:
        es: "Desarrollo de una herramienta de sonificación para asistir a radiólogos en la examinación de cáncer de mama. En colaboración con el Dr. Rodrigo Cádiz y el Dr. Patricio de la Cuadra."
        en: "Development of a sonification tool to assist radiologists in the detection of breast cancer. In collaboration with Dr. Rodrigo Cádiz and Dr. Patricio de la Cuadra."
      priority: 1

